<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Quản lý Sinh viên - HUTECH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">
    <h2 class="mb-4">Danh sách Sinh viên</h2>

    <div class="card mb-4 p-3">
        <div class="row g-3">
            <div class="col"><input type="text" id="code" class="form-control" placeholder="MSSV"></div>
            <div class="col"><input type="text" id="name" class="form-control" placeholder="Họ tên"></div>
            <div class="col"><input type="number" id="gpa" class="form-control" placeholder="GPA" step="0.1"></div>
            <div class="col"><button onclick="addStudent()" class="btn btn-primary">Thêm mới</button></div>
        </div>
    </div>

    <div class="card mb-4 p-3">
        <label for="search" class="form-label mb-2">Tìm kiếm sinh viên</label>
        <input type="text" id="search" class="form-control" placeholder="Tìm theo MSSV, họ tên, ID hoặc GPA..." oninput="filterStudents()">
    </div>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>MSSV</th>
                <th>Họ tên</th>
                <th>GPA</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody id="student-list"></tbody>
    </table>

    <script>
        let allStudents = [];

        function normalizeText(value) {
            return String(value ?? '').toLowerCase().trim();
        }

        function renderStudents(students) {
            const list = document.getElementById('student-list');
            if (!students.length) {
                list.innerHTML = '<tr><td colspan="5" class="text-center text-muted">Không có sinh viên phù hợp</td></tr>';
                return;
            }

            list.innerHTML = students.map(s => `
                <tr>
                    <td>${s.id}</td><td>${s.student_code}</td>
                    <td>${s.fullname}</td><td>${s.gpa}</td>
                    <td><button class="btn btn-danger btn-sm" onclick="deleteStudent(${s.id})">Xóa</button></td>
                </tr>
            `).join('');
        }

        async function loadStudents() {
            const res = await fetch('/students/');
            allStudents = await res.json();
            filterStudents();
        }

        function filterStudents() {
            const keyword = normalizeText(document.getElementById('search').value);
            if (!keyword) {
                renderStudents(allStudents);
                return;
            }

            const filtered = allStudents.filter(student => {
                return [student.id, student.student_code, student.fullname, student.gpa]
                    .some(field => normalizeText(field).includes(keyword));
            });

            renderStudents(filtered);
        }

        async function addStudent() {
            const payload = {
                student_code: document.getElementById('code').value,
                fullname: document.getElementById('name').value,
                gpa: parseFloat(document.getElementById('gpa').value)
            };
            await fetch('/students/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            loadStudents();
        }

        async function deleteStudent(id) {
            await fetch(`/students/${id}`, { method: 'DELETE' });
            loadStudents();
        }

        loadStudents();
    </script>
</body>

</html>
