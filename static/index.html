<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Quản lý Sinh viên - HUTECH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">
    <h2 class="mb-4">Danh sách Sinh viên</h2>

    <div class="card mb-4 p-3">
        <div class="row g-3">
            <div class="col"><input type="text" id="code" class="form-control" placeholder="MSSV"></div>
            <div class="col"><input type="text" id="name" class="form-control" placeholder="Họ tên"></div>
            <div class="col"><input type="number" id="gpa" class="form-control" min = "0.1" max = "4.0" placeholder="GPA" step="0.1" ></div>
            <div class="col"><button onclick="addStudent()" class="btn btn-primary">Thêm mới</button></div>
        </div>
    </div>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>MSSV</th>
                <th>Họ tên</th>
                <th>GPA</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody id="student-list"></tbody>
    </table>

    <script src="/static/js/student.js"></script>
</body>

</html>
