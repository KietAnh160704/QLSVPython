<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>HUTECH - Student Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .page {
            display: none;
        }

        .active {
            display: block;
        }

        .badge-major {
            background-color: #e9ecef;
            color: #495057;
            border: 1px solid #ced4da;
        }

        .search-wrap {
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
            border: 1px solid #dee2e6;
            border-radius: 12px;
            padding: 12px;
        }

        .search-input {
            border-radius: 999px;
            padding-left: 16px;
            border: 1px solid #ced4da;
            transition: box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .search-input:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.15);
        }

        .search-count {
            font-size: 0.9rem;
            color: #6c757d;
            white-space: nowrap;
        }
    </style>
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary mb-4 shadow">
        <div class="container">
            <span class="navbar-brand mb-0 h1">QLSV System - HUTECH</span>
            <button class="btn btn-light btn-sm" onclick="showPage('list-page')">Trang chủ</button>
        </div>
    </nav>

    <div class="container">

        <div id="list-page" class="page active">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3>Danh sách Sinh viên</h3>
                <button class="btn btn-success" onclick="showPage('add-page')">+ Thêm sinh viên</button>
            </div>
            <div class="search-wrap mb-3">
                <div class="d-flex flex-column flex-md-row gap-2 align-items-md-center">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0">🔍</span>
                        <input type="text" id="search" class="form-control search-input border-start-0" placeholder="Tìm theo MSSV, họ tên, khoa, ngành, GPA..." oninput="filterStudents()">
                        <button class="btn btn-outline-secondary" type="button" onclick="clearSearch()">Xóa lọc</button>
                    </div>
                    <span id="search-count" class="search-count">0 kết quả</span>
                </div>
            </div>
            <div class="card shadow-sm overflow-hidden">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>MSSV</th>
                            <th>Họ tên</th>
                            <th>Chuyên khoa / Ngành</th>
                            <th>GPA</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="student-list"></tbody>
                </table>
            </div>
        </div>

        <div id="add-page" class="page">
            <div class="card shadow-sm p-4">
                <h3>Thêm sinh viên mới</h3>
                <hr>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label font-weight-bold">MSSV</label>
                        <input type="text" id="add-code" class="form-control" placeholder="Ví dụ: 228060...." maxlength="10" inputmode="numeric" pattern="\d{10}" title="MSSV phải gồm đúng 10 chữ số">
                        <div id="add-code-error" class="text-danger small mt-1"></div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Họ tên</label>
                        <input type="text" id="add-name" class="form-control" placeholder="Nhập tên đầy đủ" pattern="^[^\d]+$" title="Họ tên không được chứa số">
                        <div id="add-name-error" class="text-danger small mt-1"></div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-5 mb-3">
                        <label class="form-label">Chuyên khoa</label>
                        <input type="text" id="add-dept" class="form-control" placeholder="Ví dụ: CNTT">
                    </div>
                    <div class="col-md-5 mb-3">
                        <label class="form-label">Chuyên ngành</label>
                        <input type="text" id="add-major" class="form-control" placeholder="Ví dụ: Kỹ thuật phần mềm">
                    </div>
                    <div class="col-md-2 mb-3">
                        <label class="form-label">GPA</label>
                        <input type="number" id="add-gpa" class="form-control" step="0.1" min="0.1" max="4.0">
                        <div id="add-gpa-error" class="text-danger small mt-1"></div>
                    </div>
                </div>
                <div id="add-form-message" class="text-danger small mt-1"></div>
                <div class="d-flex gap-2 mt-3">
                    <button class="btn btn-primary px-4" onclick="addStudent()">Lưu lại</button>
                    <button class="btn btn-secondary" onclick="showPage('list-page')">Hủy bỏ</button>
                </div>
            </div>
        </div>

        <div id="edit-page" class="page">
            <div class="card shadow-sm p-4 border-warning">
                <h3 class="text-warning">Chỉnh sửa sinh viên</h3>
                <hr>
                <input type="hidden" id="edit-id">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">MSSV</label>
                        <input type="text" id="edit-code" class="form-control" maxlength="10" inputmode="numeric" pattern="\d{10}" title="MSSV phải gồm đúng 10 chữ số">
                        <div id="edit-code-error" class="text-danger small mt-1"></div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Họ tên</label>
                        <input type="text" id="edit-name" class="form-control" pattern="^[^\d]+$" title="Họ tên không được chứa số">
                        <div id="edit-name-error" class="text-danger small mt-1"></div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-5 mb-3">
                        <label class="form-label">Chuyên khoa</label>
                        <input type="text" id="edit-dept" class="form-control">
                    </div>
                    <div class="col-md-5 mb-3">
                        <label class="form-label">Chuyên ngành</label>
                        <input type="text" id="edit-major" class="form-control">
                    </div>
                    <div class="col-md-2 mb-3">
                        <label class="form-label">GPA</label>
                        <input type="number" id="edit-gpa" class="form-control" step="0.1" min="0.1" max="4.0">
                        <div id="edit-gpa-error" class="text-danger small mt-1"></div>
                    </div>
                </div>
                <div id="edit-form-message" class="text-danger small mt-1"></div>
                <div class="d-flex gap-2 mt-3">
                    <button class="btn btn-warning px-4" onclick="updateStudent()">Cập nhật</button>
                    <button class="btn btn-secondary" onclick="showPage('list-page')">Hủy bỏ</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        let allStudents = [];

        function setFieldError(errorId, message) {
            const errorEl = document.getElementById(errorId);
            if (errorEl) {
                errorEl.textContent = message || '';
            }
        }

        function setFormMessage(formMessageId, message) {
            const messageEl = document.getElementById(formMessageId);
            if (messageEl) {
                messageEl.textContent = message || '';
            }
        }

        function clearValidationMessages(prefix) {
            setFieldError(`${prefix}-code-error`, '');
            setFieldError(`${prefix}-name-error`, '');
            setFieldError(`${prefix}-gpa-error`, '');
            setFormMessage(`${prefix}-form-message`, '');
        }

        function sanitizeStudentCodeInput(inputElement) {
            inputElement.value = String(inputElement.value || '').replace(/\D/g, '').slice(0, 10);
        }

        function sanitizeFullnameInput(inputElement) {
            const sanitized = String(inputElement.value || '').replace(/[^\p{L}\s]/gu, '');
            inputElement.value = sanitized.replace(/\s{2,}/g, ' ');
        }

        function attachInputGuards() {
            ['add-code', 'edit-code'].forEach(id => {
                const input = document.getElementById(id);
                if (input) {
                    input.addEventListener('input', () => sanitizeStudentCodeInput(input));
                }
            });

            ['add-name', 'edit-name'].forEach(id => {
                const input = document.getElementById(id);
                if (input) {
                    input.addEventListener('input', () => sanitizeFullnameInput(input));
                }
            });
        }

        function validateStudentInput(code, fullname, gpa, prefix) {
            const trimmedCode = String(code || '').trim();
            const trimmedName = String(fullname || '').trim();
            const codeRegex = /^\d{10}$/;
            let isValid = true;

            clearValidationMessages(prefix);

            if (!codeRegex.test(trimmedCode)) {
                setFieldError(`${prefix}-code-error`, 'MSSV phải gồm đúng 10 chữ số.');
                isValid = false;
            }

            if (!trimmedName) {
                setFieldError(`${prefix}-name-error`, 'Họ tên không được để trống.');
                isValid = false;
            }

            if (!Number.isFinite(gpa) || gpa < 0.1 || gpa > 4.0) {
                setFieldError(`${prefix}-gpa-error`, 'GPA phải trong khoảng từ 0.1 đến 4.0.');
                isValid = false;
            }

            return isValid;
        }

        async function fetchWithValidation(url, options) {
            const res = await fetch(url, options);
            if (!res.ok) {
                let errorMessage = 'Dữ liệu không hợp lệ hoặc có lỗi từ máy chủ.';
                try {
                    const errorData = await res.json();
                    if (Array.isArray(errorData?.detail)) {
                        errorMessage = errorData.detail.map(item => item.msg).join('\n');
                    } else if (typeof errorData?.detail === 'string') {
                        errorMessage = errorData.detail;
                    }
                } catch (error) {
                    // Keep default error message when response body is not JSON.
                }
                throw new Error(errorMessage);
            }
            return res;
        }

        function normalizeText(value) {
            return String(value ?? '').toLowerCase().trim();
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if (pageId === 'list-page') loadStudents();
        }

        function updateSearchCount(currentCount, totalCount) {
            const countEl = document.getElementById('search-count');
            countEl.textContent = `${currentCount} / ${totalCount} kết quả`;
        }

        function renderStudents(students) {
            const list = document.getElementById('student-list');
            if (!students.length) {
                list.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">Không có sinh viên phù hợp</td></tr>';
                updateSearchCount(0, allStudents.length);
                return;
            }

            list.innerHTML = students.map(s => `
                <tr>
                    <td><strong>${s.student_code}</strong></td>
                    <td>${s.fullname}</td>
                    <td>
                        <small class="text-muted d-block">${s.department || 'N/A'}</small>
                        <span class="badge badge-major">${s.major || 'N/A'}</span>
                    </td>
                    <td><span class="badge bg-primary fs-6">${s.gpa}</span></td>
                    <td>
                        <button class="btn btn-outline-warning btn-sm" onclick='goEditPage(${s.id}, ${JSON.stringify(s.student_code)}, ${JSON.stringify(s.fullname)}, ${s.gpa}, ${JSON.stringify(s.department)}, ${JSON.stringify(s.major)})'>Sửa</button>
                        <button class="btn btn-outline-danger btn-sm" onclick="deleteStudent(${s.id})">Xóa</button>
                    </td>
                </tr>
            `).join('');

            updateSearchCount(students.length, allStudents.length);
        }

        async function loadStudents() {
            const res = await fetch('/students/');
            allStudents = await res.json();
            filterStudents();
        }

        function filterStudents() {
            const keyword = normalizeText(document.getElementById('search').value);
            if (!keyword) {
                renderStudents(allStudents);
                return;
            }

            const filtered = allStudents.filter(student => {
                return [
                    student.id,
                    student.student_code,
                    student.fullname,
                    student.gpa,
                    student.department,
                    student.major
                ].some(field => normalizeText(field).includes(keyword));
            });

            renderStudents(filtered);
        }

        function clearSearch() {
            const searchInput = document.getElementById('search');
            searchInput.value = '';
            filterStudents();
            searchInput.focus();
        }

        async function addStudent() {
            const studentCode = document.getElementById('add-code').value;
            const fullname = document.getElementById('add-name').value;
            const gpa = parseFloat(document.getElementById('add-gpa').value);

            if (!validateStudentInput(studentCode, fullname, gpa, 'add')) {
                return;
            }

            const payload = {
                student_code: studentCode.trim(),
                fullname: fullname.trim(),
                gpa: gpa,
                department: document.getElementById('add-dept').value,
                major: document.getElementById('add-major').value
            };
            try {
                await fetchWithValidation('/students/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                showPage('list-page');
                // Reset form
                document.getElementById('add-code').value = '';
                document.getElementById('add-name').value = '';
                document.getElementById('add-dept').value = '';
                document.getElementById('add-major').value = '';
                document.getElementById('add-gpa').value = '';
                clearValidationMessages('add');
            } catch (error) {
                setFormMessage('add-form-message', error.message);
            }
        }

        function goEditPage(id, code, name, gpa, dept, major) {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-code').value = code;
            document.getElementById('edit-name').value = name;
            document.getElementById('edit-gpa').value = gpa;
            document.getElementById('edit-dept').value = (dept !== 'undefined' && dept !== 'null') ? dept : '';
            document.getElementById('edit-major').value = (major !== 'undefined' && major !== 'null') ? major : '';
            showPage('edit-page');
        }

        async function updateStudent() {
            const id = document.getElementById('edit-id').value;
            const studentCode = document.getElementById('edit-code').value;
            const fullname = document.getElementById('edit-name').value;
            const gpa = parseFloat(document.getElementById('edit-gpa').value);

            if (!validateStudentInput(studentCode, fullname, gpa, 'edit')) {
                return;
            }

            const payload = {
                student_code: studentCode.trim(),
                fullname: fullname.trim(),
                gpa: gpa,
                department: document.getElementById('edit-dept').value,
                major: document.getElementById('edit-major').value
            };
            try {
                await fetchWithValidation(`/students/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                clearValidationMessages('edit');
                showPage('list-page');
            } catch (error) {
                setFormMessage('edit-form-message', error.message);
            }
        }

        async function deleteStudent(id) {
            if (confirm("Bạn có chắc chắn muốn xóa sinh viên này?")) {
                await fetch(`/students/${id}`, { method: 'DELETE' });
                loadStudents();
            }
        }

        attachInputGuards();
        loadStudents();
    </script>
</body>

</html>
